name: Route issue to project column

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: read

jobs:
  route-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Route labeled issue
        uses: actions/github-script@v7
        env:
          PROJECT_ID: ${{ vars.PROJECT_V2_ID }}
          STATUS_FIELD_ID: ${{ vars.PROJECT_V2_STATUS_FIELD_ID }}
          STATUS_TODO_OPTION_ID: ${{ vars.PROJECT_V2_STATUS_TODO_OPTION_ID }}
          STATUS_IN_PROGRESS_OPTION_ID: ${{ vars.PROJECT_V2_STATUS_IN_PROGRESS_OPTION_ID }}
          STATUS_REVIEW_OPTION_ID: ${{ vars.PROJECT_V2_STATUS_REVIEW_OPTION_ID }}
          STATUS_DONE_OPTION_ID: ${{ vars.PROJECT_V2_STATUS_DONE_OPTION_ID }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labelToStatusOption = {
              "status:todo": process.env.STATUS_TODO_OPTION_ID,
              "status:in-progress": process.env.STATUS_IN_PROGRESS_OPTION_ID,
              "status:review": process.env.STATUS_REVIEW_OPTION_ID,
              "status:done": process.env.STATUS_DONE_OPTION_ID,
            };

            const labels = context.payload.issue.labels.map((label) => label.name);
            const matchingLabel = labels.find((name) => labelToStatusOption[name]);

            if (!matchingLabel) {
              core.info("No routing label found; skipping project move.");
              return;
            }

            const projectId = process.env.PROJECT_ID;
            const statusFieldId = process.env.STATUS_FIELD_ID;
            const statusOptionId = labelToStatusOption[matchingLabel];

            if (!projectId || !statusFieldId || !statusOptionId) {
              core.setFailed(
                "Missing required Project V2 variable(s). Configure PROJECT_V2_ID, PROJECT_V2_STATUS_FIELD_ID, and status option IDs."
              );
              return;
            }

            const issueNodeId = context.payload.issue.node_id;

            const itemLookup = await github.graphql(
              `query($projectId: ID!, $issueId: ID!) {
                node(id: $projectId) {
                  ... on ProjectV2 {
                    items(first: 100, filterBy: {contentId: $issueId}) {
                      nodes { id }
                    }
                  }
                }
              }`,
              {
                projectId,
                issueId: issueNodeId,
              }
            );

            let itemId = itemLookup.node.items.nodes[0]?.id;

            if (!itemId) {
              const addItem = await github.graphql(
                `mutation($projectId: ID!, $issueId: ID!) {
                  addProjectV2ItemById(input: {projectId: $projectId, contentId: $issueId}) {
                    item { id }
                  }
                }`,
                {
                  projectId,
                  issueId: issueNodeId,
                }
              );

              itemId = addItem.addProjectV2ItemById.item.id;
            }

            await github.graphql(
              `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(
                  input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }
                ) {
                  projectV2Item { id }
                }
              }`,
              {
                projectId,
                itemId,
                fieldId: statusFieldId,
                optionId: statusOptionId,
              }
            );

            core.info(`Moved #${context.payload.issue.number} using label '${matchingLabel}'.`);
